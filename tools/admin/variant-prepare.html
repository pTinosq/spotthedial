<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>variant-prepare · Spot the Dial</title>
    <style>
      :root {
        --bg: #fbfaf7;
        --fg: #1a1a1a;
        --muted: #6b6b6b;
        --rule: #e6e3dc;
      }
      * { box-sizing: border-box; }
      [hidden] { display: none !important; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, sans-serif;
        display: flex;
        justify-content: center;
        padding: 32px 16px 96px;
      }
      .wrap { width: 100%; max-width: 1040px; }
      a.back { color: var(--muted); text-decoration: none; font-size: 12px; letter-spacing: 0.08em; }
      a.back:hover { color: var(--fg); }
      h1 { font-weight: 600; font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin: 12px 0 16px; }

      .row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 20px; }
      select { font: inherit; padding: 8px 10px; border: 1px solid var(--rule); background: #fff; color: var(--fg); min-width: 280px; }
      .count { font-variant-numeric: tabular-nums; color: var(--muted); font-size: 12px; }

      .drop {
        border: 1.5px dashed var(--rule); background: #fff; padding: 40px 20px; text-align: center;
        color: var(--muted); cursor: pointer; transition: border-color 0.15s, background 0.15s;
      }
      .drop.over { border-color: var(--fg); background: #f3f1ec; }
      .drop strong { color: var(--fg); }

      .cards { margin-top: 24px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
      .card { border: 1px solid var(--rule); background: #fff; }
      .card .preview { aspect-ratio: 1; background: #f3f1ec; line-height: 0; position: relative; }
      .card .preview img { width: 100%; height: 100%; object-fit: contain; }
      .card .preview .remove {
        position: absolute; top: 8px; right: 8px; border: 0; background: rgba(26,26,26,0.8); color: #fff;
        width: 26px; height: 26px; border-radius: 50%; font-size: 16px; line-height: 1; cursor: pointer;
      }
      .card .body { padding: 12px 14px 16px; }

      .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
      .chip { display: inline-flex; align-items: center; gap: 6px; background: var(--fg); color: var(--bg); border-radius: 999px; padding: 3px 6px 3px 10px; font-size: 12px; }
      .chip button { border: 0; background: transparent; color: var(--bg); cursor: pointer; font-size: 14px; line-height: 1; padding: 0 2px; }

      .tagfield { position: relative; }
      .tagfield input { width: 100%; font: inherit; padding: 7px 9px; border: 1px solid var(--rule); background: var(--bg); color: var(--fg); }
      .tagfield input:focus { outline: none; border-color: var(--fg); }
      .suggest { position: absolute; left: 0; right: 0; top: 100%; z-index: 10; background: #fff; border: 1px solid var(--rule); border-top: 0; max-height: 200px; overflow: auto; }
      .suggest div { padding: 7px 9px; cursor: pointer; }
      .suggest div.active, .suggest div:hover { background: #f3f1ec; }
      .suggest .new { color: var(--muted); }
      .suggest mark { background: transparent; color: var(--fg); font-weight: 600; }

      .bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--rule); padding: 14px 16px; display: flex; justify-content: center; }
      .bar .inner { width: 100%; max-width: 1040px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
      button.primary { font: inherit; cursor: pointer; border: 1px solid var(--fg); background: var(--fg); color: var(--bg); padding: 9px 18px; }
      button.primary:disabled { opacity: 0.4; cursor: default; }
      .hint { color: var(--muted); font-size: 12px; }
      .toast { position: fixed; bottom: 76px; left: 50%; transform: translateX(-50%); background: var(--fg); color: var(--bg); padding: 8px 16px; font-size: 12px; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
      .toast.show { opacity: 1; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <a class="back" href="/">← admin</a>
      <h1>variant-prepare</h1>

      <div class="row">
        <select id="model"><option value="">Loading models…</option></select>
        <span class="count" id="existing"></span>
      </div>

      <div class="drop" id="drop">
        <p><strong>Drop watch-face PNGs here</strong> or click to choose files.</p>
        <p class="hint">Each image is normalised (background removed, centred on a transparent canvas) and saved as WebP — same as the rest of the catalogue.</p>
        <input type="file" id="file" accept="image/png,image/jpeg,image/webp" multiple hidden />
      </div>

      <div class="cards" id="cards"></div>
    </div>

    <div class="bar">
      <div class="inner">
        <span class="hint" id="status">Pick a model, then add images.</span>
        <button class="primary" id="save" disabled>Save variants</button>
      </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
      const $ = (id) => document.getElementById(id);
      let models = [];
      let tagLibrary = [];
      let items = []; // { id, dataUrl, tags: [] }
      let uid = 0;

      async function init() {
        try {
          [models, tagLibrary] = await Promise.all([
            fetch("/api/models").then((r) => r.json()),
            fetch("/api/tags").then((r) => r.json()),
          ]);
        } catch {
          models = [];
          tagLibrary = [];
        }
        const sel = $("model");
        const prev = sel.value;
        sel.innerHTML = '<option value="">Select a model…</option>';
        let lastBrand = null;
        let group;
        for (const m of models) {
          if (m.brand !== lastBrand) {
            group = document.createElement("optgroup");
            group.label = m.brandName;
            sel.appendChild(group);
            lastBrand = m.brand;
          }
          const o = document.createElement("option");
          o.value = m.brand + "/" + m.model;
          o.textContent = m.name + (m.variantCount ? ` (${m.variantCount})` : "");
          group.appendChild(o);
        }
        if (prev) {
          sel.value = prev;
          sel.dispatchEvent(new Event("change"));
        }
      }

      function selected() {
        const [brand, model] = ($("model").value || "/").split("/");
        return brand && model ? { brand, model } : null;
      }

      $("model").addEventListener("change", () => {
        const s = selected();
        const m = s && models.find((x) => x.brand === s.brand && x.model === s.model);
        $("existing").textContent = m && m.variantCount ? `${m.variantCount} existing` : "";
        refreshStatus();
      });

      // ---- file intake ----
      const drop = $("drop");
      drop.addEventListener("click", () => $("file").click());
      $("file").addEventListener("change", (e) => addFiles(e.target.files));
      ["dragenter", "dragover"].forEach((ev) =>
        drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.add("over"); }),
      );
      ["dragleave", "drop"].forEach((ev) =>
        drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.remove("over"); }),
      );
      drop.addEventListener("drop", (e) => addFiles(e.dataTransfer.files));

      function addFiles(fileList) {
        for (const file of fileList) {
          if (!file.type.startsWith("image/")) continue;
          const reader = new FileReader();
          reader.onload = () => {
            items.push({ id: ++uid, dataUrl: reader.result, tags: [] });
            render();
          };
          reader.readAsDataURL(file);
        }
        $("file").value = "";
      }

      // ---- fuzzy tag match (subsequence, case-insensitive) ----
      function fuzzy(query, options) {
        const q = query.toLowerCase().trim();
        if (!q) return options.slice(0, 10);
        const scored = [];
        for (const opt of options) {
          const t = opt.toLowerCase();
          let qi = 0, score = 0, run = 0;
          for (let i = 0; i < t.length && qi < q.length; i++) {
            if (t[i] === q[qi]) { qi++; run++; score += run; }
            else run = 0;
          }
          if (qi === q.length) scored.push({ opt, score: score - t.indexOf(q[0]) });
        }
        return scored.sort((a, b) => b.score - a.score).map((s) => s.opt).slice(0, 10);
      }

      function render() {
        const cards = $("cards");
        cards.innerHTML = "";
        for (const item of items) cards.appendChild(cardEl(item));
        refreshStatus();
      }

      function refreshStatus() {
        const s = selected();
        const ok = s && items.length > 0;
        $("save").disabled = !ok;
        $("status").textContent = !s
          ? "Pick a model, then add images."
          : items.length === 0
            ? "Add one or more images."
            : `${items.length} image${items.length > 1 ? "s" : ""} ready for ${s.model}.`;
      }

      function cardEl(item) {
        const card = document.createElement("div");
        card.className = "card";

        const preview = document.createElement("div");
        preview.className = "preview";
        const img = document.createElement("img");
        img.src = item.dataUrl;
        const rm = document.createElement("button");
        rm.className = "remove";
        rm.textContent = "×";
        rm.title = "Remove";
        rm.addEventListener("click", () => {
          items = items.filter((x) => x.id !== item.id);
          render();
        });
        preview.append(img, rm);

        const body = document.createElement("div");
        body.className = "body";
        const chips = document.createElement("div");
        chips.className = "chips";
        const field = tagField(item, () => renderChips(item, chips));
        body.append(chips, field);
        renderChips(item, chips);

        card.append(preview, body);
        return card;
      }

      function renderChips(item, chips) {
        chips.innerHTML = "";
        item.tags.forEach((tag) => {
          const c = document.createElement("span");
          c.className = "chip";
          c.textContent = tag;
          const x = document.createElement("button");
          x.textContent = "×";
          x.addEventListener("click", () => {
            item.tags = item.tags.filter((t) => t !== tag);
            renderChips(item, chips);
          });
          c.appendChild(x);
          chips.appendChild(c);
        });
      }

      function tagField(item, onChange) {
        const wrap = document.createElement("div");
        wrap.className = "tagfield";
        const input = document.createElement("input");
        input.placeholder = "Add a tag…";
        const sug = document.createElement("div");
        sug.className = "suggest";
        sug.hidden = true;
        wrap.append(input, sug);

        let active = -1;
        let current = [];

        const add = (tag) => {
          tag = tag.trim();
          if (tag && !item.tags.includes(tag)) {
            item.tags.push(tag);
            if (!tagLibrary.includes(tag)) tagLibrary.push(tag);
            onChange();
          }
          input.value = "";
          close();
        };
        const close = () => { sug.hidden = true; active = -1; };

        const open = () => {
          const q = input.value;
          const pool = tagLibrary.filter((t) => !item.tags.includes(t));
          current = fuzzy(q, pool);
          sug.innerHTML = "";
          const exact = current.some((t) => t.toLowerCase() === q.trim().toLowerCase());
          if (q.trim() && !exact) {
            const d = document.createElement("div");
            d.className = "new";
            d.textContent = `+ Add "${q.trim()}"`;
            d.addEventListener("mousedown", (e) => { e.preventDefault(); add(q); });
            sug.appendChild(d);
          }
          current.forEach((t, i) => {
            const d = document.createElement("div");
            d.dataset.i = i;
            d.textContent = t;
            d.addEventListener("mousedown", (e) => { e.preventDefault(); add(t); });
            sug.appendChild(d);
          });
          sug.hidden = sug.children.length === 0;
        };

        input.addEventListener("input", () => { active = -1; open(); });
        input.addEventListener("focus", open);
        input.addEventListener("blur", () => setTimeout(close, 120));
        input.addEventListener("keydown", (e) => {
          const opts = [...sug.querySelectorAll("div")];
          if (e.key === "ArrowDown") { e.preventDefault(); active = Math.min(active + 1, opts.length - 1); }
          else if (e.key === "ArrowUp") { e.preventDefault(); active = Math.max(active - 1, 0); }
          else if (e.key === "Enter" || e.key === ",") {
            e.preventDefault();
            if (active >= 0 && opts[active]) opts[active].dispatchEvent(new MouseEvent("mousedown"));
            else add(input.value);
            return;
          } else if (e.key === "Escape") { close(); return; }
          else return;
          opts.forEach((o, i) => o.classList.toggle("active", i === active));
        });

        return wrap;
      }

      function toast(msg) {
        const t = $("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 1800);
      }

      $("save").addEventListener("click", async () => {
        const s = selected();
        if (!s || !items.length) return;
        $("save").disabled = true;
        try {
          const res = await fetch("/api/variants", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              brand: s.brand,
              model: s.model,
              items: items.map((it) => ({ dataUrl: it.dataUrl, tags: it.tags })),
            }),
          });
          const out = await res.json();
          if (!out.ok) throw new Error(out.error || "save failed");
          toast(`Saved ${out.added} variant${out.added > 1 ? "s" : ""}`);
          items = [];
          render();
          await init(); // refresh variant counts + tag library
        } catch (err) {
          alert("Save failed: " + err.message);
        } finally {
          refreshStatus();
        }
      });

      init();
    </script>
  </body>
</html>
